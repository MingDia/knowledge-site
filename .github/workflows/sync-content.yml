name: Sync Content from knowledge-content

on:
  repository_dispatch:
    types: [content_updated]
  workflow_dispatch:

jobs:
  sync-content:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CONTENT_REPO_PAT }}
          ref: main

      - name: Checkout content repo
        uses: actions/checkout@v4
        with:
          repository: MingDia/knowledge-content
          token: ${{ secrets.CONTENT_REPO_PAT }}
          path: external-content

      - name: Sync content files to pages
        run: |
          rm -rf pages/docs
          mkdir -p pages/docs
          cp -r external-content/content/* pages/docs/

      - name: Sync public assets
        run: |
          rm -rf public/images
          mkdir -p public/images
          cp -r external-content/public/images/* public/images/ 2>/dev/null || true

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add pages/docs public/images

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "chore: sync content from knowledge-content"

      - name: Push to target repo with PAT
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.CONTENT_REPO_PAT }}@github.com/MingDia/knowledge-site.git
          git push origin HEAD:main
