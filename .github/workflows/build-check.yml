name: Build Check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate frontmatter
        run: pnpm validate

      - name: Type check
        run: pnpm typecheck

      - name: Build site
        run: pnpm build
